name: "redis"

services:
  redis:
    image: ${REDIS_IMAGE:-docker.io/library/redis}:${REDIS_TAG:-alpine}
    command: --save 60 1 --loglevel warning
    networks:
      - container_bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - ${CONFIG_DIR}/redis/data:/data
    ports:
      - "${PORT_REDIS_TCP}:6379"
    env_file:
      - .env
    labels:
      - caddy_ingress_network=container_bridge

networks:
  container_bridge:
    external: true
