[[stack]]
name = "zigbee2mqtt-home"
tags = ["iot", "smart-home", "zigbee"]

[stack.config]
server = "docker"
poll_for_updates = true
auto_update = true
destroy_before_deploy = false
git_account = "simtel12"
repo = "simtel12/komodo-app-stacks"
branch = "main"
reclone = false
file_paths = [
    "services/zigbee2mqtt/docker-compose.yaml",
    "services/zigbee2mqtt/home/docker-compose.yaml",
]

environment = """
# Configuration directory
CONFIG_DIR=[[CONFIG_DIR]]

# System configuration
TZ=[[TZ]]

# Network and domain configuration
DOMAIN=[[OP__KOMODO__COMMON__DOMAIN]]
PORT_ZIGBEE2MQTT=[[PORT_ZIGBEE2MQTT]]
ZIGBEE2MQTT_ADAPTER_HOST=[[ZIGBEE2MQTT_ADAPTER_HOST]]
ZIGBEE2MQTT_ADAPTER_PORT=[[ZIGBEE2MQTT_ADAPTER_PORT]]
"""