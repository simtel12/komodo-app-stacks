name: "caddy-truenas_scale"

services:
  caddy:
    container_name: caddy-truenas_scale
    env_file:
      - .env
    volumes:
      - ./${CADDY_INSTANCE:-caddy}/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CONFIG_DIR}/${CADDY_INSTANCE:-caddy}/data:/data
      - ${CONFIG_DIR}/${CADDY_INSTANCE:-caddy}/config:/config
    labels:
      - homepage.name=Caddy Truenas-Scale
      - homepage.description=Truenas-Scale Reverse Proxy
      - homepage.widget.url=http://${HOST_NAME}.${TAILNET}:${PORT_CADDY_ADMIN}