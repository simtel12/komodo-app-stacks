[[stack]]
name = "home assistant"
tags = ["dashboard", "homeassistant", "monitoring"]

[stack.config]
server = "pi_rack_2"
poll_for_updates = true
auto_update = true
destroy_before_deploy = false
git_account = "simtel12"
repo = "simtel12/komodo-app-stacks"
branch = "main"
reclone = false
file_paths = [
    "services/home_assistant/docker-compose.yaml",
]
config_files = []
registry_provider = "ghcr.io"
registry_account = "simtel12"
environment = """
# User and group configuration
TZ=[[TZ]]

# Logging configuration
LOGGING_DRIVER=[[LOGGING_DRIVER]]

# Application configuration
HOMEASSISTANT_TAG=stable

"""