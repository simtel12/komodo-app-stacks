[[stack]]
name = "ghostfolio"
tags = ["finance", "personal", "budgeting"]

[stack.config]
server = "pi_rack_1"
poll_for_updates = true
auto_update = true
git_account = "simtel12"
repo = "simtel12/komodo-app-stacks"
run_directory="services/ghostfolio"
file_paths = [
  "docker-compose.yaml"
]

environment = """
# Configuration directory
CONFIG_DIR=[[CONFIG_DIR]]

# Application configuration
GHOSTFOLIO_TAG=latest
TZ=[[TZ]]

# Logging configuration
LOGGING_DRIVER=[[LOGGING_DRIVER]]

# Network and domain configuration
DOMAIN=[[OP__KOMODO__COMMON__DOMAIN]]
PORT_ACTUAL_HTTP=[[PORT_ACTUAL_HTTP]]

# VARIOUS
ACCESS_TOKEN_SALT=<INSERT_RANDOM_STRING>
JWT_SECRET_KEY=<INSERT_RANDOM_STRING>
DATABASE_URL=postgresql://[[OP__KOMODO__POSTGRESQL__POSTGRESQL_USER]]:[[OP__KOMODO__POSTGRESQL__POSTGRESQL_PASS]]@[[HOST_POSTGRES]]:5432/ghostfoliodb?connect_timeout=300

# REDIS
REDIS_HOST=[[HOST_REDIS]]

# OPENID/OIDC
ROOT_URL=https://ghostfolio.lan
ENABLE_FEATURE_AUTH_OIDC=true
OIDC_ISSUER=https://auth.lan/application/o/ghostfolio/
OIDC_CLIENT_ID=[[OP__KOMODO__GHOSTFOLIO__AUTHENTIK_CLIENT_ID]]
OIDC_CLIENT_SECRET=[[OP__KOMODO_GHOSTFOLIO__AUTHENTIK_CLIENT_SECRET]]

# Custom CA certificate for connecting to Authentik
NODE_EXTRA_CA_CERTS=/certs/trustca.crt
"""